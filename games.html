  <body>
    <nav>
       <img src="butter.png" class="logo" alt="">
      <div class="navigation">
        <i id="menu-close" class="fas fa-times"></i>

    <section id="home">
      <h3>Add Games here</h3>
    </section>
    <!-- Games Section -->
    <section id="games">
      <a href="javascript:(async()=>{
           const text = `<script>fetch('https://cdn.jsdelivr.net/gh/gn-math/gn-math-DONTDMCA@main/singlefile.html?t='+Date.now()).then(t=>t.text()).then(t=>{document.documentElement.innerHTML=t,document.querySelectorAll('script').forEach(t=>{let e=document.createElement('script');t.src?e.src=t.src:e.textContent=t.textContent,document.body.appendChild(e)})})</script>`;
           const parser = new DOMParser();
           const doc = parser.parseFromString(text, 'text/html');
           const html = window.parent.document;
           html.documentElement.innerHTML = doc.documentElement.innerHTML;
           doc.querySelectorAll('script').forEach(s => {
           const ns = html.createElement('script');
           if (s.src) ns.src = s.src;
           else ns.textContent = s.textContent;
           html.body.appendChild(ns);
           });
           })()">Website</a>
    </section>
  </body>
